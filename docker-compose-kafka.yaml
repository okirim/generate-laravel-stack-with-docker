import org.apache.hc.client5.http.classic.HttpClient;
import org.apache.hc.client5.http.impl.classic.HttpClients;
import org.apache.hc.client5.http.impl.io.PoolingHttpClientConnectionManagerBuilder;
import org.apache.hc.client5.http.ssl.DefaultClientTlsStrategy;
import org.apache.hc.core5.http.HttpHost;
import org.apache.hc.core5.http.io.SocketConfig;
import org.apache.hc.core5.util.Timeout;

import org.springframework.boot.ssl.SslBundle;
import org.springframework.boot.ssl.SslBundles;
import org.springframework.context.annotation.Bean;
import org.springframework.context.annotation.Configuration;
import org.springframework.ws.client.core.WebServiceTemplate;
import org.springframework.ws.transport.http.HttpComponentsMessageSender;

import javax.net.ssl.SSLContext;
import java.security.SecureRandom;

@Configuration
public class SoapClientConfig {

    @Bean
    public WebServiceTemplate webServiceTemplate(SslBundles sslBundles) throws Exception {

        SslBundle sslBundle = sslBundles.getBundle("soap-client");

        SSLContext sslContext = SSLContext.getInstance("TLS");
        sslContext.init(
                sslBundle.getManagers().getKeyManagers(),
                sslBundle.getManagers().getTrustManagers(),
                new SecureRandom()
        );

        DefaultClientTlsStrategy tlsStrategy =
                new DefaultClientTlsStrategy(sslContext);

        var connectionManager =
                PoolingHttpClientConnectionManagerBuilder.create()
                        .setTlsSocketStrategy(tlsStrategy)
                        .build();

        HttpHost proxy = new HttpHost("proxy.company.local", 8080);

        HttpClient httpClient = HttpClients.custom()
                .setConnectionManager(connectionManager)
                .setProxy(proxy)
                .build();

        HttpComponentsMessageSender messageSender =
                new HttpComponentsMessageSender(httpClient);

        WebServiceTemplate template = new WebServiceTemplate();
        template.setMessageSender(messageSender);

        return template;
    }
}
