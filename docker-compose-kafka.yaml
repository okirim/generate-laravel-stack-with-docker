@Bean
public WebServiceTemplate webServiceTemplate(SSLContext sslContext) {
    // Création du SocketFactory pour MTLS
    SSLConnectionSocketFactory sslSocketFactory =
            new SSLConnectionSocketFactory(
                    sslContext,
                    new String[] { "TLSv1.2" }, // protocoles supportés
                    null,
                    SSLConnectionSocketFactory.getDefaultHostnameVerifier()
            );

    // Registry avec HTTPS
    Registry<ConnectionSocketFactory> socketFactoryRegistry = RegistryBuilder.<ConnectionSocketFactory>create()
            .register("https", sslSocketFactory)
            .register("http", PlainConnectionSocketFactory.getSocketFactory())
            .build();

    // Connexion manager
    PoolingHttpClientConnectionManager connectionManager =
            new PoolingHttpClientConnectionManager(socketFactoryRegistry);

    // Proxy config
    HttpHost proxy = new HttpHost("proxy.host.com", 8080);
    RequestConfig requestConfig = RequestConfig.custom()
            .setProxy(proxy)
            .build();

    // Création du HttpClient avec SSLFactory et proxy
    CloseableHttpClient httpClient = HttpClients.custom()
            .setConnectionManager(connectionManager)
            .setDefaultRequestConfig(requestConfig)
            .build();

    // Création du MessageSender
    HttpComponentsMessageSender messageSender = new HttpComponentsMessageSender();
    messageSender.setHttpClient(httpClient);

    // WebServiceTemplate
    WebServiceTemplate template = new WebServiceTemplate();
    template.setMessageSender(messageSender);

    return template;
}
